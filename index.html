<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCESSE M. KILLER · Signal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #1a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* === IMAGE DE FOND (TRÈS CLAIRE) === */
        .bg-image {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.90;
            pointer-events: none;
            filter: brightness(0.95) saturate(1.2) contrast(1.05);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.20) 100%);
            pointer-events: none;
        }

        /* === PARTICULES === */
        .particle-container {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            animation: floatParticle 12s ease-in-out infinite;
            box-shadow: 0 0 30px currentColor;
        }

        .particle.pink { background: #ff69b4; color: #ff69b4; }
        .particle.gold { background: #ffd700; color: #ffd700; }
        .particle.purple { background: #c084fc; color: #c084fc; }
        .particle.white { background: #ffffff; color: #ffffff; }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 0.8; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .particle:nth-child(1) { --tx: 350px; --ty: -280px; animation-delay: 0s; left: 5%; top: 10%; }
        .particle:nth-child(2) { --tx: -300px; --ty: 380px; animation-delay: 1.2s; left: 20%; top: 35%; }
        .particle:nth-child(3) { --tx: 450px; --ty: 250px; animation-delay: 2.4s; left: 50%; top: 20%; }
        .particle:nth-child(4) { --tx: -380px; --ty: -300px; animation-delay: 3.6s; left: 70%; top: 55%; }
        .particle:nth-child(5) { --tx: 280px; --ty: -450px; animation-delay: 4.8s; left: 10%; top: 70%; }
        .particle:nth-child(6) { --tx: -250px; --ty: 480px; animation-delay: 6s; left: 40%; top: 5%; }
        .particle:nth-child(7) { --tx: 480px; --ty: 200px; animation-delay: 7.2s; left: 60%; top: 45%; }
        .particle:nth-child(8) { --tx: -420px; --ty: -380px; animation-delay: 8.4s; left: 30%; top: 80%; }
        .particle:nth-child(9) { --tx: 300px; --ty: -350px; animation-delay: 1.8s; left: 80%; top: 15%; }
        .particle:nth-child(10) { --tx: -200px; --ty: 400px; animation-delay: 5.4s; left: 55%; top: 85%; }

        /* === LOGO WHATSAPP UNIQUE EN HAUT === */
        .wa-header {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
            z-index: 15;
        }

        .wa-logo-glow {
            display: inline-block;
            position: relative;
            width: 70px;
            height: 70px;
            animation: logoFloat 3s ease-in-out infinite;
        }

        .wa-logo-glow svg {
            width: 100%;
            height: 100%;
            fill: #25D366;
            filter: drop-shadow(0 0 40px rgba(37, 211, 102, 0.5));
            position: relative;
            z-index: 2;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }

        .glow-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(37, 211, 102, 0.3);
            animation: ringPulse 2.5s ease-out infinite;
            z-index: 1;
        }
        .glow-ring:nth-child(1) { inset: -5px; border-color: rgba(37, 211, 102, 0.5); animation-delay: 0s; }
        .glow-ring:nth-child(2) { inset: -18px; border-color: rgba(37, 211, 102, 0.25); animation-delay: 0.8s; }
        .glow-ring:nth-child(3) { inset: -32px; border-color: rgba(37, 211, 102, 0.12); animation-delay: 1.6s; }

        @keyframes ringPulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .glow-bg {
            position: absolute;
            inset: -50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.20), transparent 70%);
            animation: glowPulse 2s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* === CARTE PRINCIPALE === */
        .scroll-effect {
            position: relative;
            z-index: 10;
            background: rgba(30, 10, 30, 0.45);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px 35px;
            max-width: 600px;
            width: 100%;
            margin: 10px auto 20px;
            border: 1px solid rgba(255, 105, 180, 0.08);
            box-shadow: 0 0 80px rgba(255, 20, 100, 0.04);
            text-align: center;
        }

        .scroll-effect::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,105,180,0.15), rgba(200,50,200,0.08), rgba(255,215,0,0.08), rgba(255,105,180,0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderGlow 4s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* === TITRE === */
        .main-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ff69b4;
            text-shadow: 0 0 40px rgba(255, 105, 180, 0.20);
            font-family: 'Georgia', serif;
            margin-bottom: 4px;
        }
        .main-title .kill {
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.20);
        }
        .main-title .skull {
            font-size: 32px;
            display: inline-block;
            animation: skullFloat 3s ease-in-out infinite;
        }

        @keyframes skullFloat {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(-3deg); }
        }

        .sub-title {
            color: rgba(255, 105, 180, 0.4);
            font-size: 13px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-family: 'Georgia', serif;
            margin-top: 8px;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .sub-title::after {
            content: '';
            display: block;
            width: 40%;
            height: 1px;
            margin: 10px auto 0;
            background: linear-gradient(90deg, transparent, rgba(255, 105, 180, 0.15), transparent);
        }

        .tagline {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.10);
            margin-bottom: 18px;
            font-family: 'Georgia', serif;
            opacity: 0.6;
            padding: 4px 0;
            border-top: 1px solid rgba(255, 215, 0, 0.05);
            border-bottom: 1px solid rgba(255, 215, 0, 0.05);
        }

        /* === FORMULAIRE === */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            color: #ddd;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 4px;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 14px;
            color: #eee;
            font-size: 14px;
            font-family: 'Georgia', serif;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-bottom: 1px solid #ff69b4;
        }
        .form-group select option { background: #1a0a1a; color: #eee; }
        .form-group textarea { min-height: 56px; resize: vertical; }

        /* === MESSAGE GÉNÉRÉ === */
        .generated-box {
            background: rgba(255, 105, 180, 0.02);
            border-radius: 12px;
            padding: 14px 18px;
            margin: 16px 0 18px;
            text-align: left;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            min-height: 50px;
            border-left: 2px solid rgba(255, 105, 180, 0.10);
        }
        .generated-box.visible { display: block; }
        .generated-box .msg-title {
            color: #ff69b4;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-family: 'Georgia', serif;
            opacity: 0.5;
        }
        .generated-box .msg-content {
            color: #eee;
            font-size: 14px;
            line-height: 1.9;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Georgia', serif;
        }
        .generated-box .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 17px;
            background: #ff69b4;
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-group-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-form {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 120px;
            font-family: 'Georgia', serif;
        }
        .btn-generate {
            background: linear-gradient(135deg, #ff69b4, #c084fc);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.15);
        }
        .btn-generate:hover { transform: scale(1.04); box-shadow: 0 0 50px rgba(255, 105, 180, 0.25); }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-copy {
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-copy:hover { background: rgba(255, 255, 255, 0.12); transform: scale(1.03); }
        .btn-copy:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.10);
        }
        .btn-whatsapp:hover { background: #1da851; transform: scale(1.03); box-shadow: 0 0 50px rgba(37, 211, 102, 0.20); }
        .btn-whatsapp:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        .status-text {
            color: #aaa;
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            font-family: 'Georgia', serif;
            min-height: 18px;
        }

        .footer-note {
            text-align: center;
            color: #555;
            font-size: 10px;
            margin-top: 12px;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 105, 180, 0.10);
            padding: 10px 24px;
            border-radius: 30px;
            color: #ccc;
            font-size: 12px;
            z-index: 1002;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            font-family: 'Georgia', serif;
        }
        .toast.show { opacity: 1; }

        .sound-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .sound-btn:hover { background: rgba(255, 255, 255, 0.08); transform: scale(1.05); }
        .sound-btn.active { color: #ff69b4; border-color: rgba(255, 105, 180, 0.15); }

        .footer-link {
            text-align: center;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-family: 'Georgia', serif;
        }
        .footer-link a {
            color: #ff69b4;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 3px;
            transition: 0.3s;
            opacity: 0.25;
        }
        .footer-link a:hover { opacity: 0.6; }

        /* === LUEUR QUI ÉCLAIRCIT LE SITE === */
        .glow-spread {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.08), transparent 70%);
            z-index: 5;
            pointer-events: none;
            animation: spreadGlow 4s ease-in-out infinite;
        }

        @keyframes spreadGlow {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) scale(1.5); opacity: 0.8; }
        }

        @media (max-width: 600px) {
            .scroll-effect { padding: 28px 18px; margin: 10px; }
            .main-title { font-size: 18px; letter-spacing: 1px; }
            .sub-title { font-size: 10px; letter-spacing: 6px; }
            .wa-logo-glow { width: 55px; height: 55px; }
            .glow-ring:nth-child(1) { inset: -3px; }
            .glow-ring:nth-child(2) { inset: -12px; }
            .glow-ring:nth-child(3) { inset: -22px; }
            .glow-bg { inset: -35px; }
            .glow-spread { width: 200px; height: 200px; top: -60px; }
        }
    </style>
</head>

    <script>
        // ============================================
        // SON
        // ============================================
        var video = document.getElementById('bg-video');
        var audio = document.getElementById('bg-audio');
        var soundBtn = document.getElementById('soundBtn');
        var isSoundOn = false;

        function toggleSound() {
            if (isSoundOn) {
                if (video) video.muted = true;
                audio.pause();
                soundBtn.textContent = '🔇';
                soundBtn.classList.remove('active');
                isSoundOn = false;
            } else {
                if (video) { video.muted = false; video.volume = 0.3; }
                audio.volume = 0.4;
                audio.play().catch(function(e) {});
                soundBtn.textContent = '🔊';
                soundBtn.classList.add('active');
                isSoundOn = true;
            }
        }

        // ============================================
        // MESSAGES
        // ============================================
        var messageIndex = 0;

        function generateFullMessage() {
            var nom = document.getElementById('nom').value.trim();
            var numero = document.getElementById('numero').value.trim();
            var details = document.getElementById('details').value.trim();
            var type = document.getElementById('type').value;

            var typeLabels = {
                harassment: "harassment and bullying",
                scam: "scam and fraud",
                identity: "identity theft",
                illegal: "illegal content",
                threats: "threats and violence",
                impersonation: "impersonation",
                doxxing: "doxxing and sharing private information",
                other: "serious violations"
            };

            var typeLabel = typeLabels[type] || "serious violations";

            var violationTexts = {
                harassment: "Harassment and intimidation\nAbusive behavior\nMaking me feel unsafe",
                scam: "Scam attempts\nFraudulent behavior\nMisleading others for money",
                identity: "Identity theft\nPretending to be me or others\nUsing fake identity to harm",
                illegal: "Sharing illegal content\nInappropriate material\nViolating community standards",
                threats: "Threats and intimidation\nViolent language\nMaking me fear for my safety",
                impersonation: "Impersonation\nPretending to be someone they're not\nDeceiving others",
                doxxing: "Sharing private information\nDoxxing\nViolating my privacy",
                other: "Multiple Terms of Service violations\nAbusive behavior\nCreating an unsafe environment"
            };

            var violationText = violationTexts[type] || violationTexts.other;

            var messages = [
                "Dear WhatsApp Support Team,\n\nI am writing to report a user who is clearly violating your Terms of Service. " +
                (nom ? "This person is " + nom + ". " : "") +
                (numero ? "Their number is " + numero + ". " : "") +
                "They have been engaging in " + typeLabel + ".\n\n" +
                "Here is what I have observed:\n" + violationText + "\n\n" +
                (details ? "Additional context: " + details + "\n\n" : "") +
                "I have screenshots and evidence ready to share. This behavior is unacceptable and needs to stop.\n\n" +
                "I kindly ask you to investigate this account and take appropriate action. Thank you for your time.\n\n" +
                "Sincerely,\nA concerned user",

                "Hello WhatsApp Support,\n\n" +
                "I need to report a user who is making the platform unsafe.\n\n" +
                "User: " + (nom || "Unknown") + "\n" +
                "Number: " + (numero || "Not provided") + "\n\n" +
                "This person has been " + typeLabel + ". I've seen:\n" + violationText + "\n\n" +
                (details || "I am genuinely worried and I want this to stop.") + "\n\n" +
                "I have proof and I'm willing to provide it. Please take this seriously.\n\n" +
                "Thank you for your help.\n\n" +
                "Best regards,\nA WhatsApp user",

                "Dear WhatsApp Team,\n\n" +
                "I am writing to file a formal complaint against a user who is abusing your platform.\n\n" +
                "Account: " + (nom || "Unknown") + " — " + (numero || "no number") + "\n\n" +
                "Violations:\n" + violationText + "\n\n" +
                (details || "This has been going on for too long and it's affecting my peace of mind.") + "\n\n" +
                "I have documented everything. I am ready to share the evidence.\n\n" +
                "Please investigate and remove this user. Thank you for your attention.\n\n" +
                "Sincerely,\nA concerned individual",

                "Hello WhatsApp Support,\n\n" +
                "I am reaching out because I am being targeted by a user who is " + typeLabel + ".\n\n" +
                (nom ? "The person is " + nom + ". " : "") +
                (numero ? "Their number is " + numero + ". " : "") +
                "They have been:\n" + violationText + "\n\n" +
                (details || "I feel unsafe and I need your help.") + "\n\n" +
                "I have screenshots and I can send them if needed.\n\n" +
                "Please block this account and protect the community.\n\n" +
                "Thank you,\nA worried user",

                "Dear WhatsApp,\n\n" +
                "I am contacting you to report a serious violation of your Terms of Service.\n\n" +
                "Reported user: " + (nom || "Unknown") + (numero ? " (" + numero + ")" : "") + "\n\n" +
                "This user has been " + typeLabel + ":\n" + violationText + "\n\n" +
                (details || "I have evidence of all these violations.") + "\n\n" +
                "I request that you investigate this account and take the necessary action.\n\n" +
                "Thank you for your work in keeping the platform safe.\n\n" +
                "Best regards,\nA committed user"
            ];

            var msg = messages[messageIndex % messages.length];
            messageIndex++;
            return msg;
        }

        // ============================================
        // GÉNÉRATION
        // ============================================
        var isGenerating = false;
        var displayText = '';

        function startGeneration() {
            if (isGenerating) return;

            var output = document.getElementById('message-output');
            var box = document.getElementById('generated-box');
            var btnGen = document.getElementById('btn-generate');
            var btnCopy = document.getElementById('btn-copy');
            var btnWa = document.getElementById('btn-wa');
            var status = document.getElementById('status-text');

            isGenerating = true;
            btnGen.disabled = true;
            btnCopy.disabled = true;
            btnWa.disabled = true;
            status.textContent = '⏳ Generating...';
            output.textContent = '';
            box.style.display = 'block';

            var fullMessage = generateFullMessage();
            var chars = fullMessage.split('');
            var index = 0;
            displayText = '';

            function typeNextChar() {
                if (index < chars.length) {
                    displayText += chars[index];
                    output.textContent = displayText;
                    index++;
                    var delay = 12 + Math.random() * 20;
                    setTimeout(typeNextChar, delay);
                } else {
                    isGenerating = false;
                    btnGen.disabled = false;
                    btnCopy.disabled = false;
                    btnWa.disabled = false;
                    status.textContent = '✅ Message ready';
                    showToast('✅ Message generated');
                }
            }

            setTimeout(typeNextChar, 100);
        }

        function copyMessage() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');
            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied');
            });
        }

        function sendWhatsApp() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');

            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied! Opening WhatsApp...');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied! Opening WhatsApp...');
            });

            setTimeout(function() {
                window.open('https://wa.me/', '_blank');
            }, 500);
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() {
                t.classList.remove('show');
            }, 2500);
        }
    </script>
